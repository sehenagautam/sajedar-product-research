<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Sajedar.com</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f9f4;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        .coming-soon {
            color: #28a745;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .description {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #444;
        }

        .countdown {
            font-size: 2rem;
            color: #28a745;
            font-weight: bold;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #555;
        }

        .highlight {
            color: #28a745;
            font-weight: bold;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #28a745;
            margin-bottom: 1rem;
        }

        @media (max-width: 600px) {
            .coming-soon {
                font-size: 2rem;
            }

            .countdown {
                font-size: 1.5rem;
            }

            .description {
                font-size: 1rem;
            }

            .logo {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Sajedar.com</div>
        <div class="coming-soon">Coming Soon</div>
        <div class="description">An online marketplace for digital goods. <br> Solving the online scam problem one step at a time.</div>
        <div class="countdown" id="countdown">Launching in: 30 Days</div>
        <div class="footer">Stay tuned! For updates, email us at <span class="highlight">info@sajedar.com</span>.</div>
    </div>

    <script>
        // Countdown Timer
        const countdownElement = document.getElementById('countdown');
        const targetDate = new Date('2025-01-10T00:00:00'); // Set to Jan 10, 2025

        function updateCountdown() {
            const now = new Date();
            const timeDiff = targetDate - now;

            if (timeDiff <= 0) {
                countdownElement.textContent = 'We are live!';
                return;
            }

            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

            countdownElement.textContent = `Launching in: ${days}d ${hours}h ${minutes}m ${seconds}s`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
